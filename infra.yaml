AWSTemplateFormatVersion: "2010-09-09"
Description: CodeBuild project for Infra (CDK deploy)

Parameters:
  GitHubOwner:
    Type: String
    Default: h-akira
    Description: GitHub repository owner
  GitHubRepo:
    Type: String
    Default: ShogiProject2_Infra
    Description: GitHub repository name
  GitHubBranch:
    Type: String
    Default: main
    Description: GitHub branch to build
  CodeStarConnectionArn:
    Type: String
    Description: "CodeStar Connection ARN for GitHub (e.g. arn:aws:codeconnections:ap-northeast-1:XXXXXXXXXXXX:connection/xxx)"
  Env:
    Type: String
    Description: Environment identifier (dev, pro)
    Default: dev
  DomainName:
    Type: String
    Description: "Custom domain name (e.g. shogi-dev.example.com, shogi.example.com)"
  AcmCertificateArn:
    Type: String
    Description: "ACM certificate ARN (us-east-1) for CloudFront"
  HostedZoneName:
    Type: String
    Description: "Route 53 hosted zone name (e.g. shogi-dev.example.com, shogi.example.com)"
  CognitoAuthDomain:
    Type: String
    Description: "Cognito custom domain (e.g. auth.shogi-dev.example.com)"
  CognitoCertificateArn:
    Type: String
    Description: "ACM certificate ARN (us-east-1) for Cognito custom domain"
  AllowedIps:
    Type: String
    Default: ""
    Description: "Comma-separated IP addresses for CloudFront access restriction (e.g. '1.2.3.4,5.6.7.8'). Empty = no restriction"

Resources:
  CodeConnectionsPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "policy-sgp-${Env}-cicd-connections-infra"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - codestar-connections:GetConnectionToken
              - codestar-connections:GetConnection
              - codeconnections:GetConnectionToken
              - codeconnections:GetConnection
              - codeconnections:UseConnection
            Resource: !Ref CodeStarConnectionArn

  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "role-sgp-${Env}-cicd-codebuild-infra"
      Path: /service-role/
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref CodeConnectionsPolicy

  CloudWatchLogsPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "policy-sgp-${Env}-cicd-logs-infra"
      Roles:
        - !Ref CodeBuildRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: CloudWatchLogsBasic
            Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource:
              - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/codebuild-sgp-${Env}-infra"
              - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/codebuild-sgp-${Env}-infra:*"
          - Sid: CloudWatchLogsManage
            Effect: Allow
            Action:
              - logs:DescribeLogGroups
              - logs:CreateLogGroup
              - logs:DeleteLogGroup
              - logs:PutRetentionPolicy
              - logs:DeleteRetentionPolicy
              - logs:TagLogGroup
              - logs:UntagLogGroup
              - logs:DescribeResourcePolicies
              - logs:ListTagsForResource
            Resource: "*"

  CodeBuildReportsPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "policy-sgp-${Env}-cicd-reports-infra"
      Roles:
        - !Ref CodeBuildRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - codebuild:CreateReportGroup
              - codebuild:CreateReport
              - codebuild:UpdateReport
              - codebuild:BatchPutTestCases
              - codebuild:BatchPutCodeCoverages
            Resource: !Sub "arn:aws:codebuild:${AWS::Region}:${AWS::AccountId}:report-group/codebuild-sgp-${Env}-infra-*"

  CDKDeployPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "policy-sgp-${Env}-cicd-cdk-infra"
      Roles:
        - !Ref CodeBuildRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: STSAssumeRole
            Effect: Allow
            Action:
              - sts:AssumeRole
            Resource:
              - !Sub "arn:aws:iam::${AWS::AccountId}:role/cdk-*"
          - Sid: CloudFormationStack
            Effect: Allow
            Action:
              - cloudformation:CreateChangeSet
              - cloudformation:CreateStack
              - cloudformation:DeleteStack
              - cloudformation:DescribeChangeSet
              - cloudformation:DescribeStackEvents
              - cloudformation:DescribeStackResources
              - cloudformation:DescribeStacks
              - cloudformation:ExecuteChangeSet
              - cloudformation:GetTemplate
              - cloudformation:GetTemplateSummary
              - cloudformation:ListStackResources
              - cloudformation:UpdateStack
              - cloudformation:UpdateTerminationProtection
              - cloudformation:DeleteChangeSet
              - cloudformation:ListChangeSets
              - cloudformation:ListExports
            Resource: "*"
          - Sid: S3CDKAssets
            Effect: Allow
            Action:
              - s3:CreateBucket
              - s3:GetObject
              - s3:PutObject
              - s3:ListBucket
              - s3:DeleteObject
              - s3:GetBucketLocation
              - s3:GetBucketPolicy
              - s3:PutBucketPolicy
              - s3:DeleteBucketPolicy
              - s3:PutBucketVersioning
              - s3:GetBucketVersioning
              - s3:PutBucketPublicAccessBlock
              - s3:GetBucketPublicAccessBlock
              - s3:PutBucketTagging
              - s3:GetBucketTagging
              - s3:PutEncryptionConfiguration
              - s3:GetEncryptionConfiguration
              - s3:PutLifecycleConfiguration
              - s3:GetLifecycleConfiguration
            Resource:
              - !Sub "arn:aws:s3:::cdk-*"
              - !Sub "arn:aws:s3:::cdk-*/*"
          - Sid: IAMBootstrapRoles
            Effect: Allow
            Action:
              - iam:CreateRole
              - iam:AttachRolePolicy
              - iam:DeleteRole
              - iam:DetachRolePolicy
              - iam:GetRole
              - iam:TagRole
              - iam:UntagRole
              - iam:DeleteRolePolicy
              - iam:PutRolePolicy
              - iam:GetRolePolicy
              - iam:ListAttachedRolePolicies
              - iam:ListRolePolicies
              - iam:UpdateAssumeRolePolicy
            Resource:
              - !Sub "arn:aws:iam::${AWS::AccountId}:role/cdk-*"
          - Sid: IAMManagedPolicies
            Effect: Allow
            Action:
              - iam:CreatePolicy
              - iam:DeletePolicy
              - iam:GetPolicy
              - iam:GetPolicyVersion
              - iam:ListPolicyVersions
              - iam:CreatePolicyVersion
              - iam:DeletePolicyVersion
              - iam:TagPolicy
              - iam:UntagPolicy
            Resource:
              - !Sub "arn:aws:iam::${AWS::AccountId}:policy/policy-sgp-*"
          - Sid: IAMPassRole
            Effect: Allow
            Action:
              - iam:PassRole
            Resource:
              - !Sub "arn:aws:iam::${AWS::AccountId}:role/cdk-*"
          - Sid: SSMCDKBootstrap
            Effect: Allow
            Action:
              - ssm:GetParameter
              - ssm:PutParameter
              - ssm:DeleteParameter
            Resource:
              - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/cdk-bootstrap/*"
          - Sid: ECRBootstrap
            Effect: Allow
            Action:
              - ecr:CreateRepository
              - ecr:DeleteRepository
              - ecr:DescribeRepositories
              - ecr:PutLifecyclePolicy
              - ecr:SetRepositoryPolicy
              - ecr:GetRepositoryPolicy
              - ecr:DeleteRepositoryPolicy
              - ecr:TagResource
              - ecr:UntagResource
              - ecr:ListTagsForResource
            Resource:
              - !Sub "arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/cdk-*"

  CodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub "codebuild-sgp-${Env}-infra"
      Description: Deploy infrastructure with CDK (Cognito + S3 + CloudFront)
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts:
        Type: NO_ARTIFACTS
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux-x86_64-standard:5.0
        EnvironmentVariables:
          - Name: ENV
            Value: !Ref Env
          - Name: DOMAIN_NAME
            Value: !Ref DomainName
          - Name: ACM_CERTIFICATE_ARN
            Value: !Ref AcmCertificateArn
          - Name: HOSTED_ZONE_NAME
            Value: !Ref HostedZoneName
          - Name: COGNITO_AUTH_DOMAIN
            Value: !Ref CognitoAuthDomain
          - Name: COGNITO_CERTIFICATE_ARN
            Value: !Ref CognitoCertificateArn
          - Name: ALLOWED_IPS
            Value: !Ref AllowedIps
      Source:
        Type: GITHUB
        Location: !Sub "https://github.com/${GitHubOwner}/${GitHubRepo}.git"
        BuildSpec: buildspec.yml
      SourceVersion: !Sub "refs/heads/${GitHubBranch}"
      Triggers:
        Webhook: true
        FilterGroups:
          - - Type: EVENT
              Pattern: PUSH
            - Type: HEAD_REF
              Pattern: !Sub "^refs/heads/${GitHubBranch}$"
      Tags:
        - Key: Project
          Value: ShogiProject
        - Key: Env
          Value: !Ref Env
      TimeoutInMinutes: 30

Outputs:
  CodeBuildProjectName:
    Value: !Ref CodeBuildProject
    Export:
      Name: !Sub "${AWS::StackName}-ProjectName"
  CodeBuildProjectArn:
    Value: !GetAtt CodeBuildProject.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ProjectArn"
  ServiceRoleArn:
    Value: !GetAtt CodeBuildRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ServiceRoleArn"
